<script>
(function(){
var el=document.getElementById("wsData");
if(!el)return;
var d;try{d=JSON.parse(el.textContent);}catch(x){return;}
if(!d)return;
function e(s){return String(s||"");}
if(d.version){
  var b=document.querySelector(".badge");
  if(b)b.textContent="الإصدار "+d.version+" — "+(d.status||"");
  var p=document.querySelector(".version-pill b");
  if(p)p.textContent="v"+d.version;
}
if(d.desc){var sub=document.querySelector(".hero-sub");if(sub)sub.textContent=d.desc;}
if(d.hero){
  if(d.hero.title1&&d.hero.title2){
    var ht=document.querySelector(".hero-title");
    if(ht)ht.innerHTML=e(d.hero.title1)+"<br><span>"+e(d.hero.title2)+"</span>";
  }
  if(d.hero.bg1&&d.hero.bg2){
    var hr=document.querySelector(".hero");
    if(hr)hr.style.background="linear-gradient(135deg,"+d.hero.bg1+" 0%,"+d.hero.bg2+" 100%)";
  }
}
var st=document.querySelectorAll(".stat-num");
if(st[0]&&d.statFeat)st[0].textContent=d.statFeat;
if(st[1]&&d.statPages)st[1].textContent=d.statPages;
if(st[2]&&d.stat3)st[2].textContent=d.stat3;
if(d.changelog&&d.changelog.length){
  var cl=document.querySelector(".changelog");
  if(cl){
    cl.innerHTML="";
    for(var i=0;i<d.changelog.length;i++){
      var c=d.changelog[i];
      var dv=document.createElement("div");
      dv.className="changelog-item fade-card";
      dv.innerHTML="<div class='cl-version'>"+e(c.version)+"</div><div><div class='cl-date'>"+e(c.date)+"</div><div class='cl-text'>"+e(c.text)+"</div></div>";
      cl.appendChild(dv);
    }
    var ob=new IntersectionObserver(function(en){for(var j=0;j<en.length;j++){if(en[j].isIntersecting){en[j].target.classList.add("visible");ob.unobserve(en[j].target);}}},{threshold:0.1});
    cl.querySelectorAll(".changelog-item").forEach(function(x){ob.observe(x);});
  }
}
if(d.owner){
  var on2=document.querySelector(".owner-name");if(on2)on2.textContent=e(d.owner.name);
  var or2=document.querySelector(".owner-role");if(or2)or2.textContent=e(d.owner.role);
  var oi=document.querySelector(".owner-ip");if(oi)oi.textContent=e(d.owner.ip)+" © "+e(d.owner.year);
}
if(d.install){
  var ia=document.querySelector(".install-big-btn");if(ia){ia.href=d.install.url;ia.textContent=d.install.btn;}
  var iu=document.querySelector(".copy-box-url");if(iu)iu.textContent=d.install.url;
}
if(d.notif&&d.notif.active&&d.notif.text){
  var ni=document.createElement("div");
  var bg={"info":"#EFF6FF","success":"#ECFDF5","warning":"#FFFBEB","danger":"#FEF2F2"}[d.notif.type]||"#EFF6FF";
  var co={"info":"#1E40AF","success":"#065F46","warning":"#92400E","danger":"#991B1B"}[d.notif.type]||"#1E40AF";
  ni.style.cssText="position:fixed;"+(d.notif.pos==="bottom"?"bottom:20px;":"top:80px;")+"left:50%;transform:translateX(-50%);z-index:9997;background:"+bg+";color:"+co+";border:1px solid #ccc;border-radius:14px;padding:14px 20px;max-width:500px;width:90%;font-family:Cairo,sans-serif;direction:rtl;font-size:13px;box-shadow:0 8px 30px rgba(0,0,0,.15);";
  ni.innerHTML=(d.notif.title?"<b style='display:block;margin-bottom:4px;'>"+e(d.notif.title)+"</b>":"")+e(d.notif.text);
  document.body.appendChild(ni);
  if(d.notif.duration>0)setTimeout(function(){ni.remove();},d.notif.duration);
}
if(d.banner&&d.banner.active&&d.banner.text){
  var bn=document.createElement("div");
  bn.style.cssText="position:fixed;"+(d.banner.pos==="bottom"?"bottom:0;":"top:0;")+"right:0;left:0;z-index:9996;background:"+(d.banner.color||"#1E3A8A")+";color:#fff;padding:10px 20px;text-align:center;font-family:Cairo,sans-serif;font-size:13px;font-weight:600;";
  bn.textContent=d.banner.text;
  if(d.banner.pos==="bottom")document.body.appendChild(bn);
  else document.body.insertBefore(bn,document.body.firstChild);
}
})();
</script>
